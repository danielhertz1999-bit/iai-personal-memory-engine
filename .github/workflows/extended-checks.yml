name: Extended checks

# Non-blocking checks that track work in progress without gating every push:
#   - Linux build/test (the native engine is code-complete on Linux but not yet
#     validated end-to-end)
#   - the lint backlog
# Runs weekly and on demand, so day-to-day pushes stay quiet.

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays, 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-linux:
    name: build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: System build deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Correctness gate
        run: pytest -m "not perf and not slow and not live"

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff>=0.5"
      - run: ruff check .
